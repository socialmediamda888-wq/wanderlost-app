<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wanderlost — Discover Your Next Adventure</title>
  <meta name="description" content="Wanderlost is a premium travel discovery app powered by Google Maps. Find hidden gems, restaurants, cafes, parks and more around you." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          animation: {
            'sonar': 'sonar 2s ease-out infinite',
            'glow-pulse': 'glowPulse 2.5s ease-in-out infinite',
            'float-up': 'floatUp 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards',
            'slide-up': 'slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards',
          },
          keyframes: {
            sonar: { '0%': { transform: 'scale(0.5)', opacity: '0.8' }, '100%': { transform: 'scale(2.5)', opacity: '0' } },
            glowPulse: { '0%,100%': { boxShadow: '0 0 20px rgba(255,255,255,0.3)' }, '50%': { boxShadow: '0 0 50px rgba(255,255,255,0.7)' } },
            floatUp: { from: { opacity: '0', transform: 'translateY(30px) scale(0.9)' }, to: { opacity: '1', transform: 'translateY(0) scale(1)' } },
            slideUp: { from: { opacity: '0', transform: 'translateY(60px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
    #map { position: absolute; inset: 0; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 25px 50px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.1); }
    .glass-dark { background: rgba(10,10,20,0.6); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
    .glass-white { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .cat-btn { transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
    .cat-btn:hover { transform: scale(1.05); }
    .cat-btn.active { background: rgba(255,255,255,0.95); color: #111 !important; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .discover-btn { transition: transform 0.15s ease; }
    .discover-btn:hover { transform: scale(1.05); }
    .discover-btn:active { transform: scale(0.96); }
    #discovery-sheet { transform-origin: center bottom; }
    .sheet-morph { animation: sheetMorph 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes sheetMorph { from { opacity: 0; transform: scale(0.85) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .pill-morph { animation: pillMorph 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes pillMorph { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .fade-in { animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
    .sonar-ring { animation: sonar 2s ease-out infinite; }
    .user-glow { animation: glowPulse 2.5s ease-in-out infinite; }
    @keyframes sonar { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(3); opacity: 0; } }
    @keyframes glowPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    .spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .paywall-overlay { animation: overlayIn 0.3s ease forwards; }
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
    .paywall-card { animation: cardBounce 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes cardBounce { from { opacity: 0; transform: scale(0.7) translateY(40px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .save-btn.saved { background: rgba(244,63,94,0.9) !important; color: white !important; }
    .credits-critical { color: #f87171 !important; }
  </style>
</head>
<body>

<!-- Map Canvas -->
<div id="map"></div>

<!-- ═══════════════════════════════════════════════════ -->
<!-- TOP LEFT: Logo -->
<div id="logo" class="absolute top-4 left-4 glass rounded-2xl px-4 py-2.5 flex items-center gap-2.5 fade-in" style="animation-delay:0.8s;opacity:0">
  <i data-lucide="compass" class="text-white" style="width:20px;height:20px;stroke-width:2"></i>
  <span class="text-white font-bold text-lg tracking-tight">Wanderlost</span>
</div>

<!-- TOP RIGHT: Credits Badge -->
<div id="credits-badge" class="absolute top-4 right-4 glass rounded-full px-4 py-2 flex items-center gap-2 fade-in" style="animation-delay:1s;opacity:0">
  <i data-lucide="zap" id="credits-icon" class="text-amber-300" style="width:14px;height:14px;stroke-width:2.5"></i>
  <span id="credits-text" class="text-white/80 text-sm font-medium">3 Free Discoveries</span>
</div>

<!-- CATEGORY STRIP -->
<div id="category-strip" class="absolute left-4 right-4 fade-in" style="top:68px;animation-delay:1.2s;opacity:0">
  <div class="glass rounded-2xl p-2 overflow-x-auto no-scrollbar flex gap-2">
    <!-- Categories injected by JS -->
  </div>
</div>

<!-- BOTTOM HUD — Button / Sheet / Pill -->
<div id="hud" class="absolute left-4 right-4 flex justify-center" style="bottom:32px"></div>

<!-- PAYWALL MODAL -->
<div id="paywall" class="absolute inset-0 flex items-end justify-center pb-8 z-50" style="display:none!important;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);">
  <div class="paywall-card glass-dark rounded-3xl p-8 w-full max-w-sm text-center mx-4">
    <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-5" style="background:rgba(255,255,255,0.1)">
      <i data-lucide="lock" class="text-white" style="width:28px;height:28px"></i>
    </div>
    <h3 class="text-white text-2xl font-bold mb-2">Unlock Premium</h3>
    <p class="text-sm mb-6 leading-relaxed" style="color:rgba(255,255,255,0.55)">
      You've used all your free discoveries. Upgrade for unlimited access to all 13 categories and endless exploration.
    </p>
    <button onclick="closePremium()" class="w-full rounded-2xl py-3.5 font-bold text-sm mb-3 flex items-center justify-center gap-2 hover:opacity-90 transition-opacity" style="background:white;color:#111">
      <i data-lucide="star" style="width:16px;height:16px"></i>
      Upgrade to Premium — $4.99/mo
    </button>
    <button onclick="hidePremium()" class="w-full py-2 text-sm hover:text-white/60 transition-colors" style="color:rgba(255,255,255,0.35)">
      Maybe Later
    </button>
  </div>
</div>

<!-- GOOGLE MAPS API -->
<script>
// ─────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────
const MAPS_API_KEY = 'AIzaSyB1RVtX565j0NYmTtFebx1nmDCrh6X0rYM';
const MAP_ID       = 'fbb4c31d8d7ddda1d4548f5f';

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let credits       = 3;
let isPremium     = false;
let userLocation  = null;
let selectedPlace = null;
let activeCategory= null;
let hudState      = 'button'; // 'button' | 'sheet' | 'pill'
let savedPlaces   = [];
let previewUsed   = false;
let mapInstance   = null;
let placesService = null;
let poiMarker     = null;
let googleRef     = null;
const SPRING = { stiffness: 150, damping: 20 };

// ─────────────────────────────────────────
//  SILVER / MINIMALIST MAP STYLE
// ─────────────────────────────────────────
const SILVER_STYLE = [
  { elementType: 'geometry',                    stylers: [{ color: '#f2f2f0' }] },
  { elementType: 'labels.icon',                 stylers: [{ visibility: 'off' }] },
  { elementType: 'labels.text.fill',            stylers: [{ color: '#8c8c8c' }] },
  { elementType: 'labels.text.stroke',          stylers: [{ color: '#f5f5f5' }] },
  { featureType: 'administrative',              elementType: 'geometry.fill', stylers: [{ color: '#e8e8e4' }] },
  { featureType: 'administrative.land_parcel',  elementType: 'labels',        stylers: [{ visibility: 'off' }] },
  { featureType: 'poi',                         stylers: [{ visibility: 'off' }] },
  { featureType: 'poi.park',                    elementType: 'geometry.fill', stylers: [{ color: '#e0e4dc' }] },
  { featureType: 'poi.park',                    elementType: 'labels',        stylers: [{ visibility: 'off' }] },
  { featureType: 'road',                        elementType: 'geometry',      stylers: [{ color: '#ffffff' }] },
  { featureType: 'road',                        elementType: 'geometry.stroke', stylers: [{ color: '#e8e8e8' }] },
  { featureType: 'road.highway',                elementType: 'geometry',      stylers: [{ color: '#f0eeeb' }] },
  { featureType: 'road.highway',                elementType: 'geometry.stroke', stylers: [{ color: '#dddbd5' }] },
  { featureType: 'road.highway',                elementType: 'labels.text.fill', stylers: [{ color: '#a0a0a0' }] },
  { featureType: 'road.arterial',               elementType: 'labels',        stylers: [{ visibility: 'off' }] },
  { featureType: 'road.local',                  elementType: 'labels',        stylers: [{ visibility: 'off' }] },
  { featureType: 'transit',                     stylers: [{ visibility: 'off' }] },
  { featureType: 'water',                       elementType: 'geometry',      stylers: [{ color: '#c8d0d8' }] },
  { featureType: 'water',                       elementType: 'labels.text.fill', stylers: [{ color: '#a0aab0' }] },
];

// ─────────────────────────────────────────
//  CATEGORIES
// ─────────────────────────────────────────
const CATEGORIES = [
  { label: 'Restaurants',       type: 'restaurant',            icon: 'utensils-crossed' },
  { label: 'Cafes',             type: 'cafe',                  icon: 'coffee' },
  { label: 'Bakeries',          type: 'bakery',                icon: 'croissant' },
  { label: 'Bars',              type: 'bar',                   icon: 'wine' },
  { label: 'Parks',             type: 'park',                  icon: 'tree-pine' },
  { label: 'Libraries',         type: 'library',               icon: 'library' },
  { label: 'Museums',           type: 'museum',                icon: 'landmark' },
  { label: 'Galleries',         type: 'art_gallery',           icon: 'paintbrush' },
  { label: 'Bookstores',        type: 'book_store',            icon: 'book-open' },
  { label: 'Markets',           type: 'grocery_or_supermarket',icon: 'shopping-bag' },
  { label: 'Viewpoints',        type: 'tourist_attraction',    icon: 'eye' },
  { label: 'Public Squares',    type: 'city_hall',             icon: 'building-2' },
  { label: 'Artisan Workshops', type: 'store',                 icon: 'hammer' },
];

// ─────────────────────────────────────────
//  HAVERSINE
// ─────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371, r = Math.PI / 180;
  const dLat = (lat2 - lat1) * r, dLng = (lng2 - lng1) * r;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*r) * Math.cos(lat2*r) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function fmtDist(d) { return d < 1 ? `${Math.round(d*1000)}m` : `${d.toFixed(1)}km`; }

// ─────────────────────────────────────────
//  POWER ZOOM ANIMATION
// ─────────────────────────────────────────
function powerZoom(map, lat, lng) {
  map.setCenter({ lat, lng });
  const startZoom = 2, endZoom = 15, duration = 2500;
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    // Ease in-out cubic
    const e = t < 0.5 ? 4*t**3 : 1 - (-2*t+2)**3 / 2;
    map.setZoom(startZoom + (endZoom - startZoom) * e);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ─────────────────────────────────────────
//  CREATE USER MARKER (AdvancedMarkerElement)
// ─────────────────────────────────────────
function createUserMarker(google, map, lat, lng) {
  const el = document.createElement('div');
  el.style.cssText = 'position:relative;width:60px;height:60px;display:flex;align-items:center;justify-content:center';
  el.innerHTML = `
    <div class="sonar-ring" style="position:absolute;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.12);pointer-events:none"></div>
    <div class="sonar-ring" style="position:absolute;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.08);pointer-events:none;animation-delay:0.7s"></div>
    <div class="user-glow" style="width:12px;height:12px;border-radius:50%;background:white;box-shadow:0 0 0 3px rgba(255,255,255,0.3),0 0 25px rgba(255,255,255,0.8)"></div>`;
  new google.maps.marker.AdvancedMarkerElement({ map, position: { lat, lng }, content: el });
}

// ─────────────────────────────────────────
//  CREATE POI MARKER
// ─────────────────────────────────────────
function createPoiMarker(google, map, lat, lng) {
  if (poiMarker) poiMarker.map = null;
  const el = document.createElement('div');
  el.style.cssText = 'position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center';
  el.innerHTML = `
    <div class="sonar-ring" style="position:absolute;width:40px;height:40px;border-radius:50%;background:rgba(99,102,241,0.3)"></div>
    <div style="width:10px;height:10px;border-radius:50%;background:#6366f1;border:2.5px solid white;box-shadow:0 0 15px #6366f1aa"></div>`;
  poiMarker = new google.maps.marker.AdvancedMarkerElement({ map, position: { lat, lng }, content: el });
}

// ─────────────────────────────────────────
//  CREDITS UI
// ─────────────────────────────────────────
function updateCreditsUI() {
  const text = document.getElementById('credits-text');
  const icon = document.getElementById('credits-icon');
  if (isPremium) {
    text.textContent = 'Premium';
    text.style.color = 'rgba(255,255,255,0.9)';
    icon.setAttribute('data-lucide', 'star');
    lucide.createIcons({ elements: [icon] });
  } else {
    text.textContent = `${credits} Free ${credits === 1 ? 'Discovery' : 'Discoveries'}`;
    if (credits <= 1) text.classList.add('credits-critical');
    else text.classList.remove('credits-critical');
  }
}

// ─────────────────────────────────────────
//  RENDER CATEGORY STRIP
// ─────────────────────────────────────────
function renderCategories() {
  const strip = document.querySelector('#category-strip > div');
  strip.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    const isActive = activeCategory?.label === cat.label;
    btn.className = `cat-btn flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-semibold glass text-white/80 ${isActive ? 'active' : ''}`;
    btn.id = `cat-${cat.label.replace(/\s+/g,'-')}`;
    btn.innerHTML = `<i data-lucide="${cat.icon}" style="width:13px;height:13px;stroke-width:2"></i>${cat.label}`;
    btn.onclick = () => handleCategorySelect(cat);
    strip.appendChild(btn);
  });
  lucide.createIcons({ elements: strip.querySelectorAll('[data-lucide]') });
}

function handleCategorySelect(cat) {
  if (!isPremium && previewUsed) { showPremium(); return; }
  activeCategory = activeCategory?.label === cat.label ? null : cat;
  renderCategories();
}

// ─────────────────────────────────────────
//  HUD RENDERING
// ─────────────────────────────────────────
function setHUD(state) {
  hudState = state;
  const hud = document.getElementById('hud');
  hud.innerHTML = '';

  if (state === 'button') renderDiscoverButton(hud);
  else if (state === 'sheet') renderSheet(hud);
  else if (state === 'pill') renderPill(hud);

  lucide.createIcons({ elements: hud.querySelectorAll('[data-lucide]') });
}

function renderDiscoverButton(container) {
  const btn = document.createElement('button');
  btn.id = 'discover-btn';
  btn.className = 'discover-btn glass rounded-full px-8 py-4 flex items-center gap-3 text-white sheet-morph';
  btn.innerHTML = `
    <i data-lucide="navigation" style="width:20px;height:20px;stroke-width:2"></i>
    <span class="text-base font-semibold tracking-wide">Discover Places</span>`;
  btn.onclick = handleDiscover;
  container.appendChild(btn);
}

function renderSheet(container) {
  if (!selectedPlace) return;
  const isSaved = savedPlaces.some(s => s.placeId === selectedPlace.placeId);
  const mapsUrl = `https://www.google.com/maps/place/?q=place_id:${selectedPlace.placeId}`;
  const sheet = document.createElement('div');
  sheet.id = 'discovery-sheet';
  sheet.className = 'glass-dark rounded-3xl p-6 w-full sheet-morph';
  sheet.style.maxWidth = '420px';
  sheet.innerHTML = `
    <!-- Header row -->
    <div class="flex justify-between items-start mb-4">
      <div style="max-width:280px">
        <p class="text-xs uppercase tracking-widest mb-1" style="color:rgba(255,255,255,0.45);letter-spacing:0.15em">${selectedPlace.category}</p>
        <h2 class="text-white text-xl font-bold leading-tight">${selectedPlace.name}</h2>
      </div>
      <div class="flex gap-2 ml-2 flex-shrink-0">
        <button id="collapse-btn" title="Collapse (V)" class="w-8 h-8 rounded-full flex items-center justify-center hover:opacity-80 transition-opacity" style="background:rgba(255,255,255,0.1)">
          <i data-lucide="chevron-down" style="width:15px;height:15px;color:rgba(255,255,255,0.6)"></i>
        </button>
        <button id="dismiss-btn" title="Dismiss (X)" class="w-8 h-8 rounded-full flex items-center justify-center hover:opacity-80 transition-opacity" style="background:rgba(255,255,255,0.1)">
          <i data-lucide="x" style="width:15px;height:15px;color:rgba(255,255,255,0.6)"></i>
        </button>
      </div>
    </div>
    <!-- Meta -->
    <div class="space-y-2 mb-5">
      <div class="flex items-center gap-2 text-sm" style="color:rgba(255,255,255,0.65)">
        <i data-lucide="navigation" style="width:14px;height:14px;flex-shrink:0"></i>
        <span>${fmtDist(selectedPlace.distance)} away from you</span>
      </div>
      <div class="flex items-start gap-2 text-sm" style="color:rgba(255,255,255,0.65)">
        <i data-lucide="map-pin" style="width:14px;height:14px;flex-shrink:0;margin-top:2px"></i>
        <span>${selectedPlace.address || 'Address unavailable'}</span>
      </div>
    </div>
    <!-- Actions -->
    <div class="flex gap-3">
      <a href="${mapsUrl}" target="_blank" rel="noopener noreferrer"
        class="flex-1 rounded-2xl py-3 text-center font-semibold text-sm hover:opacity-90 transition-opacity"
        style="background:white;color:#111">Open in Maps</a>
      <button id="save-btn" class="save-btn w-12 h-12 rounded-2xl flex items-center justify-center transition-all" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6)" ${isSaved?'data-saved="true"':''}>
        <i data-lucide="heart" style="width:18px;height:18px" fill="${isSaved?'currentColor':'none'}"></i>
      </button>
    </div>
    <!-- Key hints -->
    <div class="flex gap-3 mt-3 justify-center">
      <span style="color:rgba(255,255,255,0.25);font-size:11px">V to collapse</span>
      <span style="color:rgba(255,255,255,0.25);font-size:11px">·</span>
      <span style="color:rgba(255,255,255,0.25);font-size:11px">X to dismiss</span>
    </div>`;
  container.appendChild(sheet);

  document.getElementById('collapse-btn').onclick = () => setHUD('pill');
  document.getElementById('dismiss-btn').onclick  = dismissSheet;
  const saveBtn = document.getElementById('save-btn');
  saveBtn.onclick = () => {
    const isSavedNow = savedPlaces.some(s => s.placeId === selectedPlace.placeId);
    if (!isSavedNow) { savedPlaces.push(selectedPlace); saveBtn.classList.add('saved'); }
    else { savedPlaces = savedPlaces.filter(p => p.placeId !== selectedPlace.placeId); saveBtn.classList.remove('saved'); }
    saveBtn.querySelector('[data-lucide="heart"]').setAttribute('fill', !isSavedNow ? 'currentColor' : 'none');
  };
}

function renderPill(container) {
  if (!selectedPlace) return;
  const pill = document.createElement('button');
  pill.className = 'glass rounded-full px-5 py-3 flex items-center gap-2 text-white pill-morph hover:opacity-80 transition-opacity';
  pill.style.maxWidth = '320px';
  pill.innerHTML = `
    <i data-lucide="map-pin" style="width:15px;height:15px;flex-shrink:0"></i>
    <span class="text-sm font-medium truncate">${selectedPlace.name}</span>
    <i data-lucide="chevron-up" style="width:14px;height:14px;flex-shrink:0;opacity:0.6"></i>`;
  pill.onclick = () => setHUD('sheet');
  container.appendChild(pill);
}

function dismissSheet() {
  setHUD('button');
  selectedPlace = null;
  if (mapInstance && userLocation) {
    mapInstance.panTo(userLocation);
    mapInstance.setZoom(15);
  }
  if (poiMarker) { poiMarker.map = null; poiMarker = null; }
}

// ─────────────────────────────────────────
//  DISCOVER HANDLER
// ─────────────────────────────────────────
function handleDiscover() {
  if (!isPremium && credits <= 0) { showPremium(); return; }
  if (!placesService || !userLocation) return;

  // spinner
  const btn = document.getElementById('discover-btn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = `<i data-lucide="compass" class="spinning" style="width:20px;height:20px"></i><span class="text-base font-semibold">Discovering…</span>`;
    lucide.createIcons({ elements: btn.querySelectorAll('[data-lucide]') });
  }

  placesService.nearbySearch({
    location: userLocation,
    radius: 1500,
    type: activeCategory?.type || 'point_of_interest',
  }, (results, status) => {
    if (status !== 'OK' || !results?.length) {
      setHUD('button'); return;
    }
    const place = results[Math.floor(Math.random() * Math.min(results.length, 8))];
    const lat   = place.geometry.location.lat();
    const lng   = place.geometry.location.lng();
    const dist  = haversine(userLocation.lat, userLocation.lng, lat, lng);

    selectedPlace = {
      name:     place.name,
      category: activeCategory?.label || 'Point of Interest',
      address:  place.vicinity,
      distance: dist,
      placeId:  place.place_id,
      lat, lng,
    };

    if (!isPremium) { credits--; previewUsed = true; updateCreditsUI(); }
    mapInstance?.panTo({ lat, lng });
    createPoiMarker(googleRef, mapInstance, lat, lng);
    setHUD('sheet');
  });
}

// ─────────────────────────────────────────
//  PAYWALL
// ─────────────────────────────────────────
function showPremium() {
  const el = document.getElementById('paywall');
  el.style.display = 'flex';
  el.style.removeProperty('display');
  el.style.cssText = 'position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2rem;z-index:50;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px)';
}
function hidePremium() {
  document.getElementById('paywall').style.cssText = 'display:none!important';
}
function closePremium() {
  isPremium = true; credits = 999;
  updateCreditsUI(); hidePremium();
}
window.hidePremium = hidePremium;
window.closePremium = closePremium;

// ─────────────────────────────────────────
//  KEYBOARD CONTROLS
// ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'v' || e.key === 'V') { if (hudState === 'sheet') setHUD('pill'); }
  if (e.key === 'x' || e.key === 'X') { if (hudState !== 'button') dismissSheet(); }
  if (e.key === 'Escape') { hidePremium(); }
});

// ─────────────────────────────────────────
//  GOOGLE MAPS INIT (called by API callback)
// ─────────────────────────────────────────
window.initMap = async function () {
  const google = window.google;
  googleRef = google;

  // Build category strip
  renderCategories();

  // Geolocation
  const initMapAt = async (lat, lng) => {
    userLocation = { lat, lng };

    const map = new google.maps.Map(document.getElementById('map'), {
      center:          { lat: 0, lng: 0 },
      zoom:            2,
      mapId:           MAP_ID,
      disableDefaultUI:true,
      gestureHandling: 'greedy',
      styles:          SILVER_STYLE,
    });
    mapInstance    = map;
    placesService  = new google.maps.places.PlacesService(map);

    // Power Zoom after brief pause
    setTimeout(() => powerZoom(map, lat, lng), 400);
    // User marker after zoom
    setTimeout(() => createUserMarker(google, map, lat, lng), 600);
    // Show HUD
    setTimeout(() => { updateCreditsUI(); setHUD('button'); }, 1200);
  };

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => initMapAt(pos.coords.latitude, pos.coords.longitude),
      ()  => initMapAt(48.8566, 2.3522) // fallback: Paris
    );
  } else {
    initMapAt(48.8566, 2.3522);
  }
};
</script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB1RVtX565j0NYmTtFebx1nmDCrh6X0rYM&libraries=places,marker&v=weekly&callback=initMap"
  async defer>
</script>
