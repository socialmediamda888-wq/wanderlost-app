<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0e13" />
  <meta name="description" content="Wanderlost — Discover extraordinary places loved by locals. Curated by the community, not algorithms." />

  <title>Wanderlost — Discover Local Gems</title>

  <!-- Inline critical: theme applied before paint to prevent FOUC -->
  <script>
    (function () {
      const t = localStorage.getItem('wanderlost-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <!-- Fonts: preconnect for speed -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/shell.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/logo.png" />
  <link rel="apple-touch-icon" href="icons/splash-logo.png" />
</head>
<body>

  <!-- ── SPLASH ────────────────────────────────────────────────────── -->
  <dialog id="splash" open>
    <img class="splash-logo" src="icons/logo.png" alt="Wanderlost" />
    <span class="splash-name">Wanderlost</span>
    <span class="splash-tagline">Curated by locals</span>
  </dialog>

  <!-- ══════════════════════════════════════════════════════════════════
       APP GRID
       ══════════════════════════════════════════════════════════════════ -->
  <div id="app" role="application" aria-label="Wanderlost">

    <!-- ── MAP LAYER (full bleed, below everything) ────────────────── -->
    <div id="map-layer" aria-hidden="true">
      <div id="gmap"></div>
      <div id="map-scrim-top"></div>
      <div id="map-scrim-bottom"></div>
    </div>

    <!-- ── TOPBAR (row 2) ──────────────────────────────────────────── -->
    <header id="topbar" role="banner">
      <div class="topbar-brand">
        <img class="topbar-logo" src="icons/logo.png" alt="" aria-hidden="true" />
        <span class="topbar-title">Wanderlost</span>
      </div>
      <div class="topbar-actions">
        <button id="btn-open-now" class="filter-chip" aria-pressed="false" aria-label="Filter: Open Now">
          <span class="material-symbols-outlined">schedule</span>
          Open Now
        </button>
        <button id="btn-menu" class="icon-btn" aria-label="Settings">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>
    </header>

    <!-- ── CATEGORY BAR (row 3) ────────────────────────────────────── -->
    <div id="category-bar" role="navigation" aria-label="Categories">
      <div class="pill-track no-scrollbar">
        <button class="pill active" data-category="all">
          <span class="material-symbols-outlined">explore</span>All
        </button>
        <button class="pill" data-category="restaurants">
          <span class="material-symbols-outlined">restaurant</span>Restaurants
        </button>
        <button class="pill" data-category="takeaway">
          <span class="material-symbols-outlined">takeout_dining</span>Take-away
        </button>
        <button class="pill" data-category="cafes">
          <span class="material-symbols-outlined">coffee</span>Cafes
        </button>
        <button class="pill" data-category="bakeries">
          <span class="material-symbols-outlined">bakery_dining</span>Bakeries
        </button>
        <button class="pill" data-category="bars">
          <span class="material-symbols-outlined">local_bar</span>Bars
        </button>
        <button class="pill" data-category="parks">
          <span class="material-symbols-outlined">park</span>Parks
        </button>
        <button class="pill" data-category="libraries">
          <span class="material-symbols-outlined">local_library</span>Libraries
        </button>
        <button class="pill" data-category="bookstores">
          <span class="material-symbols-outlined">menu_book</span>Bookstores
        </button>
        <button class="pill" data-category="museums">
          <span class="material-symbols-outlined">museum</span>Museums
        </button>
        <button class="pill" data-category="galleries">
          <span class="material-symbols-outlined">palette</span>Galleries
        </button>
        <button class="pill" data-category="markets">
          <span class="material-symbols-outlined">storefront</span>Markets
        </button>
        <button class="pill" data-category="viewpoints">
          <span class="material-symbols-outlined">landscape</span>Viewpoints
        </button>
        <button class="pill" data-category="artisan">
          <span class="material-symbols-outlined">brush</span>Artisan
        </button>
      </div>
    </div>

    <!-- ── CONTENT (row 4) — page injection target ─────────────────── -->
    <main id="content" role="main" aria-live="polite"></main>

    <!-- ── DISCOVERY SHEET (spans all rows) ────────────────────────── -->
    <div id="discovery-sheet" role="dialog" aria-label="Discovery" aria-hidden="true">
      <div class="sheet-backdrop"></div>
      <div id="sheet-surface">
        <!-- Handle -->
        <div class="sheet-handle-wrap">
          <div id="sheet-handle-pill" class="sheet-handle" role="separator" aria-orientation="horizontal"></div>
        </div>
        <!-- Header -->
        <div class="sheet-header">
          <div class="sheet-counter">
            <span class="sheet-counter-num" id="free-count">3</span>
            <span class="sheet-counter-label">free left</span>
          </div>
          <div class="sheet-controls">
            <button id="btn-sheet-next" class="icon-btn" aria-label="Next discovery">
              <span class="material-symbols-outlined">skip_next</span>
            </button>
            <button id="btn-sheet-close" class="icon-btn" aria-label="Close">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
        </div>
        <!-- Body -->
        <div id="sheet-body" class="sheet-body"></div>
      </div>
    </div>

    <!-- ── PREMIUM GATE (spans all rows) ───────────────────────────── -->
    <div id="premium-gate" role="dialog" aria-label="Premium subscription" aria-modal="true"></div>

    <!-- ── BOTTOM NAVBAR (row 5) ───────────────────────────────────── -->
    <nav id="navbar" role="navigation" aria-label="Main navigation">
      <button class="nav-item active" id="nav-map" data-page="map" aria-label="Map" aria-current="page">
        <span class="material-symbols-outlined">map</span>
        <span class="nav-label">Map</span>
      </button>

      <div class="nav-fab-wrap">
        <button class="fab" id="btn-discover" aria-label="Discover a place">
          <span class="material-symbols-outlined">explore</span>
          <span class="fab-badge" id="fab-badge">3</span>
        </button>
        <span class="fab-label">Discover</span>
      </div>

      <button class="nav-item" id="nav-account" data-page="account" aria-label="Account">
        <span class="material-symbols-outlined">person</span>
        <span class="nav-label">Account</span>
      </button>
    </nav>

  </div><!-- /#app -->

  <!-- ── Google Maps API ──────────────────────────────────────────────── -->
  <script>
    // Maps API callback: fires when Google Maps JS is fully loaded.
    // If app.js module registered __mapReadyCb first, call it;
    // otherwise set __mapsReady so app.js picks it up on boot.
    function __initMap() {
      window.__mapsReady = true;
      if (typeof window.__mapReadyCb === 'function') window.__mapReadyCb();
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB1RVtX565j0NYmTtFebx1nmDCrh6X0rYM&libraries=places,marker&callback=__initMap&loading=async" defer></script>

  <!-- ── App Entry ─────────────────────────────────────────────────── -->
  <script type="module" src="js/app.js"></script>

  <!-- ── Service Worker ────────────────────────────────────────────── -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
